<!DOCTYPE html>
<html>
<head>
<title>Smart Disposal Login</title>

<style>

body{
font-family: Arial;
background:#2c7be5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:30px;
border-radius:10px;
width:300px;
text-align:center;
box-shadow:0px 5px 10px rgba(0,0,0,0.2);
}

input{
width:90%;
padding:10px;
margin:10px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
width:95%;
padding:10px;
background:#2c7be5;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1a5edb;
}

</style>

</head>

<body>

<div class="container">

<h2>Smart Disposal System</h2>
<p>Building Login</p>

<form id="loginForm">

<input type="email" id="email" placeholder="Enter Email" required>

<input type="password" id="password" placeholder="Enter Password" required>

<button type="submit">Login</button>

</form>

<p id="message"></p>

</div>

<script>

document.getElementById("loginForm").addEventListener("submit", async function(e){

e.preventDefault()

let email = document.getElementById("email").value
let password = document.getElementById("password").value

try{
let response = await fetch("http://localhost:8000/login",{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
email:email,
password:password
})

})

let data = await response.json()

document.getElementById("message").innerText = data.message

if(data.message === "Login successful"){
window.location.href = "dashboard.html"
}

}
catch(error){
document.getElementById("message").innerText = "Server not running"
}

})

</script>

</body>
</html>
