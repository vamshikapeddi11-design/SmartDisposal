<!DOCTYPE html>
<html>
<head>

<title>Smart Disposal Dashboard</title>

<style>

body{
font-family: Arial;
background:#f4f4f4;
text-align:center;
}

.container{
margin-top:50px;
}

#binLevel{
font-size:32px;
color:green;
font-weight:bold;
}

table{
margin:auto;
margin-top:20px;
border-collapse:collapse;
}

th,td{
border:1px solid black;
padding:10px 20px;
}

</style>

</head>

<body>

<div class="container">

<h1>Smart Disposal Dashboard</h1>

<h2>Current Bin Level</h2>

<p id="binLevel">Loading...</p>

<h2>Bin History</h2>

<table id="historyTable">

<tr>
<th>Time</th>
<th>Level</th>
</tr>

</table>

</div>

<script>

async function loadData(){

try{

let response = await fetch("http://127.0.0.1:8000/bin")

let data = await response.json()

// Show current level
document.getElementById("binLevel").innerText =
data.current_level + "%"

// Show history
let table = document.getElementById("historyTable")

data.history.forEach(item => {

let row = table.insertRow()

let cell1 = row.insertCell(0)
let cell2 = row.insertCell(1)

cell1.innerText = item.time
cell2.innerText = item.level + "%"

})

}
catch(error){
document.getElementById("binLevel").innerText="Error loading data"
}

}

loadData()

</script>

</body>
</html>
