<!DOCTYPE html>
<html>
<head>
<title>Smart Disposal Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family: Arial;
background:#f4f4f4;
text-align:center;
}

.container{
width:90%;
margin:auto;
display:grid;
grid-template-columns:1fr 1fr;
grid-template-rows:auto auto auto;
gap:20px;
}

.box{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0px 0px 10px gray;
}

/* remove bullets in history */
#history{
list-style:none;
padding-left:0;
}

/* history hidden until click */
#historyBox{
display:none;
margin-top:10px;
}

/* graph position (top right) */
#graphBox{
grid-column:2;
grid-row:1;
}

button{
padding:10px 20px;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

</style>

</head>

<body>

<h1>Smart Disposal System Dashboard</h1>

<div class="container">

<!-- Current Bin Level -->
<div class="box">
<h2>Current Bin Level</h2>
<h3 id="level">Loading...</h3>
</div>

<!-- Graph -->
<div class="box" id="graphBox">
<h2>Bin Level Graph</h2>
<canvas id="binChart"></canvas>
</div>

<!-- Alerts -->
<div class="box">
<h2>Alerts</h2>
<p id="alertMessage">No alerts</p>
</div>

<!-- View Bin History -->
<div class="box">
<h2>Bin History</h2>

<button onclick="toggleHistory()">View History</button>

<div id="historyBox">
<ul id="history"></ul>
</div>

</div>

</div>

<script>

async function loadBinData(){

const response = await fetch("http://127.0.0.1:8000/bin");
const data = await response.json();

let level = data.current_level;
let status="";

/* level status */

if(level == 0){
status="Empty";
}
else if(level <= 50){
status="Half Full";
}
else if(level > 85){
status="Full";
}
else{
status="Almost Full";
}

document.getElementById("level").innerText = level+"% ("+status+")";

/* alert */

let alertBox=document.getElementById("alertMessage");

if(level > 85){
alertBox.innerText="⚠ Bin is Full";
alertBox.style.color="red";
alertBox.style.fontWeight="bold";
}
else{
alertBox.innerText="No alerts";
alertBox.style.color="red";
}

/* history */

let historyList=document.getElementById("history");
historyList.innerHTML="";

let labels=[];
let values=[];

data.history.forEach(item=>{

let date=new Date(item.time);

let time=date.toLocaleTimeString('en-US',{
hour:'numeric',
minute:'numeric',
hour12:true
});

let li=document.createElement("li");
li.innerText=time+" - "+item.level+"%";
historyList.appendChild(li);

labels.push(time);
values.push(item.level);

});

createChart(labels,values);

}

function toggleHistory(){

let box=document.getElementById("historyBox");

if(box.style.display==="none"){
box.style.display="block";
}else{
box.style.display="none";
}

}

function createChart(labels,values){

const ctx=document.getElementById("binChart").getContext("2d");

new Chart(ctx,{
type:'line',
data:{
labels:labels,
datasets:[{
label:'Bin Level',
data:values,
borderColor:'green',
fill:false
}]
}
});

}

loadBinData();

</script>

</body>
</html>
